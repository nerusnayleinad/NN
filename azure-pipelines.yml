trigger:
- main

pool:
  vmImage: 'ubuntu-latest'
  
variables:
  ecr: '881986476278.dkr.ecr.us-east-2.amazonaws.com'
  ecr_repo: 'nn'
  ecr_conn: 'azure_devops_to_ecr_docker_conn'
  trivy: 'aquasec/trivy:0.71.2'

steps:
- task: Docker@2
  inputs:
    containerRegistry: $(ecr_conn)
    repository: 'nn'
    command: 'build'
    Dockerfile: '**/Dockerfile'
    tags: |
      latest
      $(Build.BuildId)
      
- task: Docker@2
  displayName: 'Scan with Trivy'
  inputs:
    command: 'run'
    arguments: |
      -v /var/run/docker.sock:/var/run/docker.sock
      $(trivy) image $(ecr)/$(ecr_repo):$(Build.BuildId)
      --severity CRITICAL
      --exit-code 1