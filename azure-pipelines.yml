trigger:
- main

pool:
  vmImage: 'ubuntu-latest'
  
variables:
  system.debug: true
  ecr: '881986476278.dkr.ecr.us-east-2.amazonaws.com'
  ecr_repo: 'nn'
  ecr_conn: 'azure_devops_to_ecr_docker_conn'
  trivy: 'aquasec/trivy:0.71.2'
  cosign: 'ghcr.io/sigstore/cosign/cosign:latest'
      
stages:

          
- stage: Sign
  displayName: 'Sign'
  #dependsOn: Push
  jobs:
  - job: Sign
    variables:
    - group: dev
    steps:
    - task: Docker@2
      displayName: 'Pulling Image'
      inputs:
        command: 'pull'
        containerRegistry: '$(ecr_conn)'
        arguments: |
          $(ecr)/$(ecr_repo):$(Build.BuildId)
        
          
    - script: |
        digest=`docker inspect --format='{{with index .RepoDigests 0}}{{index (split . "@") 1}}{{end}}' $(ecr)/$(ecr_repo):$(Build.BuildId)`
        echo "##vso[task.setvariable variable=digest]$digest"
        
        printf "%s\n" "$(cosign.key)" > $(System. DefaultWorkingDirectory)/cosign.key
      displayName: 'Getting Docker Image Digest'


    - task: Docker@2
      displayName: 'Signing Docker Image with Cosign'
      inputs:
        command: 'run'
        arguments: |
          -v /var/run/docker.sock:/var/run/docker.sock
          $(cosign) sign
          --key $(System. DefaultWorkingDirectory)/cosign.key
          $(ecr)/$(ecr_repo)@$(digest)
