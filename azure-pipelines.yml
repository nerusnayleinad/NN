trigger:
- main

pool:
  vmImage: 'ubuntu-latest'
  
variables:
  system.debug: true
  ecr: '881986476278.dkr.ecr.us-east-2.amazonaws.com'
  ecr_repo: 'nn'
  ecr_conn: 'azure_devops_to_ecr_docker_conn'
  aws_conn: 'azure_devops_to_ecr'
  trivy: 'aquasec/trivy:0.71.2'
  cosign: 'ghcr.io/sigstore/cosign/cosign:latest'
      
stages:
- stage: Build
  displayName: 'Build'
  jobs:
  - job: Build
    displayName: 'Build'
    steps:
    - task: Docker@2
      displayName: 'Building Docker Image'
      inputs:
        containerRegistry: $(ecr_conn)
        repository: $(ecr_repo)
        command: 'build'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(Build.BuildId)
          
    - script: |
        docker save $(ecr)/$(ecr_repo):$(Build.BuildId) -o $(Build.ArtifactStagingDirectory)/$(ecr_repo).tar
        
        sed -i 's#__IMAGE_TAG__#$(Build.BuildId)#g' $(Build.SourcesDirectory)/kubernetes/overlays/*/deploy.yaml
        ls -l
        cp -r $(Build.SourcesDirectory)  $(Build.ArtifactStagingDirectory)/nn
      displayName: 'Packing Docker Image'

    - task: PublishPipelineArtifact@1
      displayName: 'Publishing Docker Image as Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/$(ecr_repo).tar'
        artifactName: 'docker-image-$(ecr_repo)'
        
    - task: PublishPipelineArtifact@1
      displayName: 'Publishing Docker Image as Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/nn'
        artifactName: 'git-repo'


- stage: Scan
  displayName: 'Scan'
  dependsOn: Build
  jobs:
  - job: Scan
    steps:
    - task: DownloadPipelineArtifact@1
      displayName: 'Downloading Image Artifact'
      inputs:
        artifactName: 'docker-image-$(ecr_repo)'
        targetPath: '$(Pipeline.Workspace)'

    - script: |
        docker load -i $(Pipeline.Workspace)/$(ecr_repo).tar
      displayName: 'Loading Docker Image'

    - task: Docker@2
      displayName: 'Scanning Docker Image OS'
      inputs:
        command: 'run'
        arguments: |
          -v /var/run/docker.sock:/var/run/docker.sock
          $(trivy) image $(ecr)/$(ecr_repo):$(Build.BuildId)
          --severity CRITICAL
          --exit-code 1
      continueOnError: false

    - task: Docker@2
      displayName: 'Scanning Docker Image Application Dependencies'
      enabled: false
      inputs:
        command: 'run'
        arguments: |
          -v $(Build.SourcesDirectory):/src
          -v /var/run/docker.sock:/var/run/docker.sock
          $(trivy) fs /src
          --severity CRITICAL
          --exit-code 1
      continueOnError: flase       
          
- stage: Push
  displayName: 'Push'
  dependsOn: Scan
  jobs:
  - job: Push
    steps:
    - task: DownloadPipelineArtifact@1
      displayName: 'Downloading Image Artifact'
      inputs:
        artifactName: 'docker-image-$(ecr_repo)'
        targetPath: '$(Pipeline.Workspace)'

    - script: |
        docker load -i $(Pipeline.Workspace)/$(ecr_repo).tar
        docker tag $(ecr)/$(ecr_repo):$(Build.BuildId) $(ecr)/$(ecr_repo):latest
      displayName: 'Loading Docker Image, and Tagging with "latest"'

    - task: Docker@2
      displayName: 'Pushing Docker Image to ECR'
      inputs:
        command: push
        containerRegistry: $(ecr_conn)
        repository: $(ecr_repo)
        tags: |
          latest
          $(Build.BuildId)
          
- stage: Sign
  displayName: 'Sign'
  dependsOn: Push
  jobs:
  - job: Sign
    variables:
    - group: dev
    steps:
    - task: Docker@2
      displayName: 'Pulling Image'
      inputs:
        command: 'pull'
        containerRegistry: '$(ecr_conn)'
        arguments: |
          $(ecr)/$(ecr_repo):$(Build.BuildId)
          
    - script: |
        digest=`docker inspect --format='{{with index .RepoDigests 0}}{{index (split . "@") 1}}{{end}}' $(ecr)/$(ecr_repo):$(Build.BuildId)`
        echo "##vso[task.setvariable variable=digest]$digest"
      displayName: 'Getting Docker Image Digest'

    - task: DownloadSecureFile@1
      name: cosignKey
      displayName: 'Download Cosign Private Key'
      inputs:
        secureFile: 'cosign.key'
          
    - task: AWSShellScript@1
      displayName: 'Run AWS CLI Commands'
      inputs:
        awsCredentials: $(aws_conn)
        regionName: 'us-east-2'
        scriptType: 'inline'
        inlineScript: |
          curl -L "https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64" -o cosign
          chmod +x cosign
          mv cosign /usr/local/bin/cosign
    
          aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin $(ecr)
    
          COSIGN_PASSWORD='' cosign sign --key $(cosignKey.secureFilePath) $(ecr)/$(ecr_repo)@$(digest)