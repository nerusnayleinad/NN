trigger:
- main

pool:
  vmImage: 'ubuntu-latest'
  
variables:
  system.debug: true
  ecr: '881986476278.dkr.ecr.us-east-2.amazonaws.com'
  ecr_repo: 'nn'
  ecr_conn: 'azure_devops_to_ecr_docker_conn'
  trivy: 'aquasec/trivy:0.71.2'
  cosign: 'ghcr.io/sigstore/cosign/cosign:latest'
      
stages:
- stage: Build
  displayName: 'Build'
  jobs:
  - job: Build
    displayName: 'Build'
    steps:

      
    - task: AzureCLI@2
      displayName: 'Get OIDC Token'
      inputs:
        azureSubscription: 'azure_oidc'
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          token=$(az account get-access-token --query accessToken -o tsv)
          az account get-access-token --query accessToken -o tsv | tee token.txt
          cat token.txt
          echo "$token"
          
          if [ -z "$token" ]; then
            echo "Failed to get token"
            exit 1
          fi
          
          echo "Token: ${token:0:20}..."
          echo "##vso[task.setvariable variable=token]$token"
        
    - task: Docker@2
      displayName: 'Signing Docker Image with Cosign'
      inputs:
        command: 'run'
        arguments: |
          -v /var/run/docker.sock:/var/run/docker.sock
          $(cosign) sign 
          --identity-token $(token)
          $(ecr)/$(ecr_repo)@$(digest)
        