apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy
spec:
  template:
    metadata:
      labels:
        version: v1
    spec:
      containers:             
      - name: nn
        image: 881986476278.dkr.ecr.us-east-2.amazonaws.com/nn:__IMAGE_TAG__          
        resources:
          requests:
            memory: "64Mi"
            cpu: "0.2"
          limits:
            memory: "128Mi"
            cpu: "0.4" 